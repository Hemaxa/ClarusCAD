name: Build And Release ClarusCAD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*project(ClarusCAD VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt | head -n1)
          if [ -z "$VERSION" ]; then
            echo "Could not extract project version from CMakeLists.txt" >&2
            exit 1
          fi

          TAG_NAME="v${VERSION}"
          RELEASE_NAME="ClarusCAD v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            qt_version: "6.5.3"
            qt_arch: "gcc_64"
            package_type: "appimage"
            artifact_name: "ClarusCAD-linux"
            artifact_path: "ClarusCAD_v*_linux.AppImage"

          - os: windows-2022
            qt_version: "6.5.3"
            qt_arch: "win64_msvc2019_64"
            package_type: "nsis"
            artifact_name: "ClarusCAD-windows"
            artifact_path: "ClarusCAD_v*_windows.exe"

          - os: macos-14
            qt_version: "6.5.3"
            qt_arch: "clang_64"
            package_type: "macos-app"
            artifact_name: "ClarusCAD-macos"
            artifact_path: "ClarusCAD_v*_macOS.app.zip"

    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libfuse2 \
            patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install"

      - name: Build project
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Install NSIS
        if: matrix.package_type == 'nsis'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Package Linux AppImage
        if: matrix.package_type == 'appimage'
        shell: bash
        run: |
          wget -qO linuxdeployqt.AppImage https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt.AppImage

          cmake --install build --prefix AppDir/usr --config Release

          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          if [ ! -f "AppDir/usr/share/applications/ClarusCAD.desktop" ]; then
            printf '%s\n' \
              '[Desktop Entry]' \
              'Type=Application' \
              'Name=ClarusCAD' \
              'Exec=ClarusCAD' \
              'Icon=ClarusCAD' \
              'Comment=2D CAD system' \
              'Categories=Graphics;Engineering;' \
              > AppDir/usr/share/applications/ClarusCAD.desktop
          fi

          if [ ! -f "AppDir/usr/share/icons/hicolor/256x256/apps/ClarusCAD.png" ]; then
            cp res/icons/app/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ClarusCAD.png
          fi

          cp AppDir/usr/share/applications/ClarusCAD.desktop AppDir/ClarusCAD.desktop
          cp AppDir/usr/share/icons/hicolor/256x256/apps/ClarusCAD.png AppDir/ClarusCAD.png

          ./linuxdeployqt.AppImage AppDir/usr/bin/ClarusCAD -appimage -extra-plugins=iconengines,imageformats,platformthemes

          APPIMAGE_FILE=$(find . -maxdepth 1 -name 'ClarusCAD*.AppImage' | head -n1)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "AppImage was not created" >&2
            exit 1
          fi
          mv "$APPIMAGE_FILE" "ClarusCAD_v${VERSION}_linux.AppImage"

      - name: Package Windows installer
        if: matrix.package_type == 'nsis'
        shell: pwsh
        run: |
          cmake --build build --config Release --target INSTALL

          $windeployqt = Join-Path $env:QT_ROOT_DIR "bin\windeployqt.exe"
          if (-not (Test-Path $windeployqt)) {
            Write-Error "windeployqt.exe not found at $windeployqt"
            exit 1
          }

          & $windeployqt --release --no-compiler-runtime --no-opengl-sw --no-translations "${{ github.workspace }}\install\bin\ClarusCAD.exe"

          Push-Location build
          cpack -G NSIS -C Release -B package
          Pop-Location

          $installer = Get-ChildItem -Path "build/package" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "NSIS installer was not created"
            exit 1
          }

          Move-Item $installer.FullName "ClarusCAD_v${env:VERSION}_windows.exe"

      - name: Package macOS app bundle
        if: matrix.package_type == 'macos-app'
        shell: bash
        run: |
          APP_BUNDLE=$(find build -type d -name 'ClarusCAD.app' | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ClarusCAD.app was not created" >&2
            exit 1
          fi

          MACDEPLOYQT="$QT_ROOT_DIR/bin/macdeployqt"
          if [ ! -x "$MACDEPLOYQT" ]; then
            echo "macdeployqt was not found at $MACDEPLOYQT" >&2
            exit 1
          fi

          "$MACDEPLOYQT" "$APP_BUNDLE" -verbose=1

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_BUNDLE" \
            "ClarusCAD_v${VERSION}_macOS.app.zip"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show downloaded files
        shell: bash
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-artifacts/*
